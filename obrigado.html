<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Análise completa do Índice de Maturidade Digital da sua empresa">
    <title>Diagnóstico Digital | Seus Resultados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
    --bg-page: #FFF4E3;
    --bg-card: #FFFFFF;
    --orange-primary: #B3674D;
    --orange-dark: #8F6144;
    --orange-light: #C9935E;
    --orange-soft: rgba(179,103,77,0.1);
    --text-dark: #5E402D;
    --text-muted: #8B7355;
    --border-light: #E8DDD0;
    --success: #10B981;
    --warning: #B3674D;
    --danger: #EF4444;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
}
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-dark);
            font-weight: 400;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 20px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1rem;
            color: var(--orange-dark);
        }

        .logo-text p {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .back-link {
            color: var(--orange-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.25s;
        }

        .back-link:hover {
            color: var(--orange-primary);
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-dark) 100%);
            padding: 40px 28px;
            color: white;
            text-align: center;
        }

        .greeting {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .greeting i {
            margin-right: 8px;
        }

        .hero-section p {
            opacity: 0.9;
            font-size: 0.8rem;
        }

        /* Score Section */
        .score-section {
            padding: 32px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .score-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .level-badge {
            display: inline-block;
            padding: 6px 20px;
            background: var(--orange-soft);
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--orange-dark);
            margin-bottom: 12px;
        }

        .level-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .level-description {
            color: var(--text-muted);
            line-height: 1.5;
            font-size: 0.85rem;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Botões Expansíveis */
        .expand-btn {
            width: 100%;
            padding: 16px 24px;
            background: transparent;
            border: none;
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.25s;
        }

        .expand-btn:hover {
            background: var(--orange-soft);
        }

        .expand-btn i {
            color: var(--orange-primary);
            transition: transform 0.3s;
        }

        .expand-btn.active i {
            transform: rotate(180deg);
        }

        /* Conteúdo Expansível */
        .expand-content {
            display: none;
            padding: 24px;
            border-top: 1px solid var(--border-light);
            background: #FCFCFD;
            animation: fadeIn 0.3s ease;
        }

        .expand-content.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Radar Container */
        .radar-container {
            text-align: center;
        }

        .radar-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .radar-title i {
            color: var(--orange-primary);
            margin-right: 8px;
        }

        .chart-wrapper {
            max-width: 300px;
            margin: 0 auto;
        }

        /* Pilares Cards */
        .pilares-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .pilar-mini {
            flex: 1;
            min-width: 100px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .pilar-mini h4 {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .pilar-mini .score {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .pilar-bar {
            width: 100%;
            height: 3px;
            background: var(--border-light);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .pilar-bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        /* Gargalos */
        .gargalos-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .gargalo-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }

        .gargalo-icon {
            width: 40px;
            height: 40px;
            background: var(--orange-soft);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--orange-primary);
            font-size: 1.1rem;
        }

        .gargalo-content {
            flex: 1;
        }

        .gargalo-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .gargalo-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .gargalo-score {
            font-weight: 700;
            color: var(--danger);
            font-size: 0.85rem;
        }

        /* Detalhes Perguntas */
        .pergunta-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .pergunta-item:last-child {
            border-bottom: none;
        }

        .pergunta-texto {
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .pergunta-resposta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            color: white;
        }

        .cta-section h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .cta-section p {
            opacity: 0.9;
            font-size: 0.8rem;
            margin-bottom: 24px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-refazer {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-refazer:hover {
            background: rgba(255,255,255,0.3);
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px 40px;
            }
            .hero-section {
                padding: 28px 20px;
            }
            .greeting {
                font-size: 1.2rem;
            }
            .pilar-mini {
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="logo-text">
                <h1>Diagnóstico Digital</h1>
                <p>Índice de Maturidade Digital</p>
            </div>
        </div>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    <div id="resultContainer"></div>

    <footer class="footer">
        <p>© 2026 · Diagnóstico Digital · Todos os direitos reservados</p>
    </footer>
</div>

<script>
    // Recuperar dados
    const userData = JSON.parse(localStorage.getItem('diagnostico_user_data') || '{}');
    const answers = JSON.parse(localStorage.getItem('diagnostico_answers') || '[]');
    const questionsData = JSON.parse(localStorage.getItem('diagnostico_questions') || '[]');

    if (!userData.name || answers.length === 0) {
        window.location.href = 'maturidade.html';
    }

    // ============================================
    // CONFIGURAÇÃO DOS 5 PILARES
    // ============================================
    const eixos = {
        aquisicao: { indices: [0, 15], nome: 'Aquisição', icone: 'fa-funnel-dollar' },
        oferta: { indices: [1, 4], nome: 'Oferta', icone: 'fa-gem' },
        vendas: { indices: [2, 5, 18], nome: 'Vendas', icone: 'fa-handshake' },
        dados: { indices: [3, 7, 19], nome: 'Dados', icone: 'fa-chart-line' },
        conteudo: { indices: [8, 11, 12], nome: 'Conteúdo', icone: 'fa-newspaper' }
    };

    function calcularPilares() {
        let resultados = {};
        for (let pilar in eixos) {
            let soma = 0;
            eixos[pilar].indices.forEach(qIdx => {
                if (answers[qIdx] !== undefined && questionsData[qIdx]) {
                    soma += questionsData[qIdx].scores[answers[qIdx]];
                }
            });
            const max = eixos[pilar].indices.length * 5;
            resultados[pilar] = Math.round((soma / max) * 100);
        }
        return resultados;
    }

    function calcularPontuacaoGeral() {
        let total = 0, maxTotal = 0;
        for (let pilar in eixos) {
            maxTotal += eixos[pilar].indices.length * 5;
            eixos[pilar].indices.forEach(qIdx => {
                if (answers[qIdx] !== undefined && questionsData[qIdx]) {
                    total += questionsData[qIdx].scores[answers[qIdx]];
                }
            });
        }
        return Math.round((total / maxTotal) * 100);
    }

    function getNivelGlobal(percentual) {
        if (percentual <= 25) return { nome: 'Estágio Inicial', badge: '🔴 Invisível', descricao: 'Sua empresa ainda não possui presença digital estruturada.', cor: '#EF4444' };
        if (percentual <= 50) return { nome: 'Estágio Reativo', badge: '🟠 Frágil', descricao: 'Você tem alguma presença digital, mas falta processo e consistência.', cor: '#F59E0B' };
        if (percentual <= 75) return { nome: 'Estágio Estruturado', badge: '🟡 Estruturado', descricao: 'Ótimo! Sua empresa possui estrutura digital consistente.', cor: '#10B981' };
        return { nome: 'Estágio Estratégico', badge: '🟢 Estratégico', descricao: 'Excelente! Você está no topo da maturidade digital.', cor: '#10B981' };
    }

    function getRecomendacao(pilar, score) {
        const recs = {
            aquisicao: 'Invista em um funil de aquisição com tráfego pago ou orgânico estruturado.',
            oferta: 'Desenvolva uma proposta de valor única (USP) que resolva uma dor específica.',
            vendas: 'Estruture um processo comercial com CRM e acompanhamento de leads.',
            dados: 'Implemente ferramentas de analytics e crie um dashboard com métricas.',
            conteudo: 'Crie um calendário editorial e produza conteúdo para cada etapa do funil.'
        };
        return recs[pilar] || 'Foque em melhorias nesta área.';
    }

    const resultados = calcularPilares();
    const pontuacaoGeral = calcularPontuacaoGeral();
    const nivel = getNivelGlobal(pontuacaoGeral);

    // Identificar 3 piores gargalos
    const gargalos = Object.entries(resultados)
        .map(([key, score]) => ({ key, nome: eixos[key].nome, icone: eixos[key].icone, score }))
        .sort((a, b) => a.score - b.score)
        .slice(0, 3);

    // Dados radar
    const radarLabels = ['Aquisição', 'Oferta', 'Vendas', 'Dados', 'Conteúdo'];
    const radarData = [resultados.aquisicao, resultados.oferta, resultados.vendas, resultados.dados, resultados.conteudo];

    // Renderizar
    function render() {
        const html = `
            <div class="result-card">
                <div class="hero-section">
                    <div class="greeting">
                        <i class="fas fa-chart-line"></i> ${userData.name}
                    </div>
                    <p>Seu diagnóstico foi gerado com base nas suas respostas</p>
                </div>

                <div class="score-section">
                    <div class="score-circle">
                        <canvas id="scoreCircle" width="140" height="140"></canvas>
                    </div>
                    <div class="level-badge">${nivel.badge}</div>
                    <div class="level-title">${nivel.nome}</div>
                    <div class="level-description">${nivel.descricao}</div>
                </div>
            </div>

            <!-- Botão: Meus Pilares -->
            <div class="result-card">
                <button class="expand-btn" id="btnPilares">
                    <span><i class="fas fa-chart-pie"></i> Meus Pilares Estratégicos</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="expand-content" id="contentPilares">
                    <div class="radar-container">
                        <div class="radar-title">
                            <i class="fas fa-chart-line"></i> Maturidade por Pilar
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="radarChart" width="300" height="300"></canvas>
                        </div>
                        <div class="pilares-grid" id="pilaresGrid"></div>
                    </div>
                </div>
            </div>

            <!-- Botão: Gargalos -->
            <div class="result-card">
                <button class="expand-btn" id="btnGargalos">
                    <span><i class="fas fa-exclamation-triangle"></i> Gargalos Prioritários</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="expand-content" id="contentGargalos">
                    <div class="gargalos-list" id="gargalosList"></div>
                </div>
            </div>

            <!-- Botão: Detalhes das Respostas -->
            <div class="result-card">
                <button class="expand-btn" id="btnRespostas">
                    <span><i class="fas fa-clipboard-list"></i> Minhas Respostas</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="expand-content" id="contentRespostas">
                    <div id="perguntasList"></div>
                </div>
            </div>

            <!-- CTA Final -->
            <div class="cta-section">
                <h3>🚀 Quer acelerar seus resultados?</h3>
                <p>Converse com um especialista e descubra como implementar um plano de ação personalizado.</p>
                <div class="btn-group">
                    <button class="btn-whatsapp" id="whatsappBtn">
                        <i class="fab fa-whatsapp"></i> Falar com Consultor
                    </button>
                    <button class="btn-refazer" id="refazerBtn">
                        <i class="fas fa-redo"></i> Refazer Diagnóstico
                    </button>
                </div>
            </div>
        `;

        document.getElementById('resultContainer').innerHTML = html;

        // Gráfico de círculo
        const circleCtx = document.getElementById('scoreCircle')?.getContext('2d');
        if (circleCtx) {
            new Chart(circleCtx, {
                type: 'doughnut',
                data: { datasets: [{ data: [pontuacaoGeral, 100 - pontuacaoGeral], backgroundColor: [nivel.cor, '#E9ECEF'], borderWidth: 0, cutout: '65%' }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } } },
                plugins: [{
                    id: 'centerText',
                    afterDraw(chart) {
                        const { ctx, width, height } = chart;
                        ctx.save();
                        ctx.font = 'bold 22px "Inter"';
                        ctx.fillStyle = '#1A1A2E';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`${pontuacaoGeral}%`, width / 2, height / 2);
                        ctx.font = '9px "Inter"';
                        ctx.fillStyle = '#6C757D';
                        ctx.fillText('IMD', width / 2, height / 2 + 22);
                        ctx.restore();
                    }
                }]
            });
        }

        // Pilares Cards
        const pilaresHtml = Object.entries(resultados).map(([key, score]) => {
            let cor = '#EF4444';
            if (score >= 70) cor = '#10B981';
            else if (score >= 40) cor = '#F59E0B';
            return `
                <div class="pilar-mini">
                    <h4>${eixos[key].nome}</h4>
                    <div class="score">${score}%</div>
                    <div class="pilar-bar">
                        <div class="pilar-bar-fill" style="width: ${score}%; background: ${cor};"></div>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('pilaresGrid') && (document.getElementById('pilaresGrid').innerHTML = pilaresHtml);

        // Gráfico Radar
        const radarCtx = document.getElementById('radarChart')?.getContext('2d');
        if (radarCtx) {
            new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: radarLabels,
                    datasets: [{ label: 'Maturidade', data: radarData, backgroundColor: 'rgba(245, 158, 11, 0.2)', borderColor: nivel.cor, borderWidth: 2, pointBackgroundColor: nivel.cor, pointBorderColor: '#fff', pointRadius: 4, fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { font: { size: 10 } } } }, plugins: { legend: { display: false } } }
            });
        }

        // Gargalos List
        const gargalosHtml = gargalos.map(g => `
            <div class="gargalo-item">
                <div class="gargalo-icon"><i class="fas ${g.icone}"></i></div>
                <div class="gargalo-content">
                    <div class="gargalo-title">${g.nome}</div>
                    <div class="gargalo-desc">${getRecomendacao(g.key, g.score)}</div>
                </div>
                <div class="gargalo-score">${g.score}%</div>
            </div>
        `).join('');
        document.getElementById('gargalosList') && (document.getElementById('gargalosList').innerHTML = gargalosHtml);

        // Perguntas Detalhadas
        const perguntasHtml = questionsData.map((q, idx) => {
            const respostaIdx = answers[idx];
            const respostaTexto = respostaIdx !== undefined ? q.options[respostaIdx] : 'Não respondida';
            return `
                <div class="pergunta-item">
                    <div class="pergunta-texto"><strong>${idx + 1}.</strong> ${q.text}</div>
                    <div class="pergunta-resposta">${respostaTexto}</div>
                </div>
            `;
        }).join('');
        document.getElementById('perguntasList') && (document.getElementById('perguntasList').innerHTML = perguntasHtml);

        // Expandir/Recolher
        function setupExpandable(btnId, contentId) {
            const btn = document.getElementById(btnId);
            const content = document.getElementById(contentId);
            if (btn && content) {
                btn.addEventListener('click', () => {
                    content.classList.toggle('show');
                    btn.classList.toggle('active');
                });
            }
        }

        setupExpandable('btnPilares', 'contentPilares');
        setupExpandable('btnGargalos', 'contentGargalos');
        setupExpandable('btnRespostas', 'contentRespostas');

        // Botão WhatsApp
        document.getElementById('whatsappBtn')?.addEventListener('click', () => {
            const msg = encodeURIComponent(`Olá! Fiz o diagnóstico de maturidade digital e obtive ${pontuacaoGeral}% (${nivel.nome}). Meus gargalos: ${gargalos.map(g => g.nome).join(', ')}. Gostaria de saber mais!`);
            window.open(`https://wa.me/5511999999999?text=${msg}`, '_blank');
        });

        // Botão Refazer
        document.getElementById('refazerBtn')?.addEventListener('click', () => {
            localStorage.removeItem('diagnostico_user_data');
            localStorage.removeItem('diagnostico_answers');
            localStorage.removeItem('diagnostico_questions');
            window.location.href = 'maturidade.html';
        });
    }

    render();
</script>
</body>
</html>
