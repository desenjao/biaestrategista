    <style>
        * {

       :root {

        body {

        }

        .logo-text p {

        }

        .back-link {

        .quiz-section {

        .progress-fill {

        .options-list {

        .option-item {
            background: var(--bg-page);

        .option-item i {

        .option-item:hover {

        .option-item.selected {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-color: var(--orange-dark);

        }

        .option-item.selected i {
            color: white !important;

        .fade-out {
            animation: fadeOut 0.2s ease forwards;
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }

        @keyframes fadeIn {

        }

        .loading-content {

            padding: 48px 40px;

        .jornada-linha {
            display: flex;

        .jornada-item {

        .jornada-icone {

        .jornada-icone i {

        }

        .jornada-item.completed .jornada-icone {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-color: var(--orange-primary);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .jornada-item.completed .jornada-icone i {

        .jornada-ativo {
            font-size: 0.7rem;

        }

        .jornada-item.completed .jornada-ativo {

        .jornada-seta {

        .jornada-seta.active {

        .loading-message {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 24px 0 20px;
        }

        .loading-progress {
            width: 100%;
            height: 6px;
            background: var(--border-light);

            overflow: hidden;
            margin-top: 20px;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--orange-primary), var(--orange-light));
            width: 0%;
            border-radius: 4px;
            transition: width 0.2s linear;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;

        @media (max-width: 640px) {
            .jornada-icone {

        @media (max-width: 768px) {

            }

    </style>

<div class="container">

    </div>
</div>

<footer class="footer">
    <p>© 2026 · Diagnóstico Digital · Todos os direitos reservados</p>
</footer>

<script>
    // ÍCONES DAS PERGUNTAS (20 ícones únicos)
    const questionIcons = [
        "fa-user-group", "fa-comment-dots", "fa-pen-fancy", "fa-face-smile", "fa-star",
        "fa-chart-line", "fa-calendar", "fa-chart-simple", "fa-video", "fa-sack-dollar",
        "fa-lightbulb", "fa-face-frown", "fa-medal", "fa-bullhorn", "fa-clock",
        "fa-calendar-week", "fa-person-walking", "fa-bullseye", "fa-eye", "fa-rocket"
    ];

    // ÍCONES DAS OPÇÕES
    const levelAIcons = ["fa-circle", "fa-face-frown", "fa-thumbs-down", "fa-arrow-down", "fa-battery-empty"];
    const levelBIcons = ["fa-circle-half-stroke", "fa-face-meh", "fa-chart-simple", "fa-arrow-right", "fa-battery-half"];
    const levelCIcons = ["fa-circle-dot", "fa-face-smile", "fa-chart-line", "fa-arrow-up", "fa-battery-full"];
    const levelDIcons = ["fa-circle-check", "fa-face-grin-stars", "fa-rocket", "fa-arrow-up-wide-short", "fa-crown"];

    // NOVAS PERGUNTAS
    const baseQuestions = [
        { text: "Hoje, como a maioria dos seus clientes chega até você?", options: ["Apenas por indicação", "Redes sociais", "WhatsApp", "Já tenho clientes chegando de várias formas"], scores: [0,2,4,5] },
        { text: "Quando alguém pergunta o que você faz, você consegue explicar com facilidade?", options: ["Não", "Às vezes", "Quase sempre", "Sim"], scores: [0,2,4,5] },
        { text: "Qual frase mais combina com sua realidade hoje?", options: ["Não sei o que postar", "Tenho ideias, mas não consigo organizar", "Posto com frequência, mas sem resultado", "Tenho uma estratégia clara"], scores: [0,2,4,5] },
        { text: "Como você se sente em relação às suas redes sociais?", options: ["Perdido(a)", "Desmotivado(a)", "Inseguro(a)", "Confiante"], scores: [0,2,4,5] },
        { text: "Você acredita que as pessoas entendem o valor do seu trabalho?", options: ["Não", "Poucas pessoas", "Em parte", "Sim"], scores: [0,2,4,5] },
        { text: "Qual é sua maior dificuldade hoje?", options: ["Conseguir clientes", "Aparecer nas redes sociais", "Organizar minha comunicação", "Transformar seguidores em clientes"], scores: [0,2,4,5] },
        { text: "Quando foi a última vez que você planejou seu conteúdo?", options: ["Nunca planejei", "Há meses", "Neste mês", "Tenho planejamento frequente"], scores: [0,2,4,5] },
        { text: "Você sente que seu negócio está crescendo como deveria?", options: ["Não", "Muito abaixo do que gostaria", "Está evoluindo aos poucos", "Sim"], scores: [0,2,4,5] },
        { text: "Com que frequência você aparece nas redes sociais?", options: ["Quase nunca", "Apenas quando lembro", "Algumas vezes por semana", "Todos os dias"], scores: [0,2,4,5] },
        { text: "Você costuma vender todos os meses?", options: ["Não", "Tenho meses bons e ruins", "Consigo vender com certa frequência", "Tenho vendas constantes"], scores: [0,2,4,5] },
        { text: "Como você cria seus conteúdos?", options: ["Improvisando", "Copiando ideias de outros perfis", "Seguindo algumas estratégias", "Tenho uma linha clara de comunicação"], scores: [0,2,4,5] },
        { text: "Qual dessas situações mais te incomoda?", options: ["Ninguém interage com meus conteúdos", "Poucas pessoas conhecem meu trabalho", "Não consigo transformar visualizações em clientes", "Não sei exatamente o que estou fazendo errado"], scores: [0,2,4,5] },
        { text: "Você sente que sua marca é lembrada pelas pessoas?", options: ["Não", "Muito pouco", "Algumas vezes", "Sim"], scores: [0,2,4,5] },
        { text: "Hoje você tem um plano para crescer nas redes sociais?", options: ["Não tenho nenhum", "Tenho algumas ideias", "Tenho um plano básico", "Tenho uma estratégia definida"], scores: [0,2,4,5] },
        { text: "Quanto tempo você perde pensando no que postar?", options: ["Muito tempo", "Algumas horas por semana", "Pouco tempo", "Já tenho isso organizado"], scores: [0,2,4,5] },
        { text: "Se você parar de postar por uma semana, o que acontece?", options: ["Meu perfil praticamente para", "Quase ninguém lembra do meu negócio", "Ainda recebo alguns contatos", "Meu negócio continua gerando oportunidades"], scores: [0,2,4,5] },
        { text: "Você sente que trabalha muito e cresce pouco?", options: ["Sim, totalmente", "Muitas vezes", "Às vezes", "Não"], scores: [0,2,4,5] },
        { text: "Qual é seu principal objetivo hoje?", options: ["Conseguir mais clientes", "Ser mais conhecido(a)", "Organizar minha comunicação", "Vender mais"], scores: [0,2,4,5] },
        { text: "Se alguém analisasse seu perfil agora, qual seria sua opinião?", options: ["Está confuso", "Poderia melhorar muito", "Está razoável", "Está bem organizado"], scores: [0,2,4,5] },
        { text: "Se você tivesse um plano claro para comunicar melhor seu negócio, acredita que conseguiria crescer mais rápido?", options: ["Sim", "Provavelmente", "Talvez", "Não sei"], scores: [5,4,2,0] }
    ];

    let shuffledQuestions = [];
    let currentQuestion = 0;
    let answers = [];
    let isTransitioning = false;
    let userData = null;

    const quizContainer = document.getElementById('quizContainer');
    const progressFill = document.getElementById('progressFill');
    const loadingOverlay = document.getElementById('loadingOverlay');

    function shuffleArray(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function shuffleOptions(question, idx) {
        const optionsWithScores = question.options.map((opt, optIdx) => ({
            text: opt,
            score: question.scores[optIdx],
            icon: optIdx === 0 ? levelAIcons[idx % levelAIcons.length] : 
                  optIdx === 1 ? levelBIcons[idx % levelBIcons.length] : 
                  optIdx === 2 ? levelCIcons[idx % levelCIcons.length] : 
                  levelDIcons[idx % levelDIcons.length]
        }));
        const shuffled = shuffleArray(optionsWithScores);
        return {
            options: shuffled.map(item => ({ text: item.text, icon: item.icon })),
            scores: shuffled.map(item => item.score)
        };
    }

    function initShuffledQuestions() {
        const shuffledBase = shuffleArray(baseQuestions);
        shuffledQuestions = shuffledBase.map((q, idx) => {
            const shuffledOpts = shuffleOptions(q, idx);
            return {
                text: q.text,
                options: shuffledOpts.options,
                scores: shuffledOpts.scores,
                icon: questionIcons[idx % questionIcons.length]
            };
        });
    }

    function updateProgress() {
        const progress = (currentQuestion / shuffledQuestions.length) * 100;
        progressFill.style.width = progress + '%';
    }

    function goToNextQuestion() {
        if (isTransitioning) return;
        if (currentQuestion + 1 >= shuffledQuestions.length) {
            showContactForm();
            return;
        }
        isTransitioning = true;
        const currentDiv = quizContainer.querySelector('.quiz-question-container');
        if (currentDiv) currentDiv.classList.add('fade-out');
        setTimeout(() => {
            currentQuestion++;
            renderQuestion();
            isTransitioning = false;
        }, 200);
    }

    function renderQuestion() {
        if (currentQuestion >= shuffledQuestions.length) {
            showContactForm();
            return;
        }
        updateProgress();
        const q = shuffledQuestions[currentQuestion];
        
        let html = `
            <div class="quiz-question-container fade-in">
                <div class="question-icon"><i class="fa-solid ${q.icon}"></i></div>
                <div class="question-counter">${currentQuestion + 1} de ${shuffledQuestions.length}</div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                <div class="options-list">
        `;
        
        q.options.forEach((opt, idx) => {
            const isSelected = answers[currentQuestion] === idx;
            html += `
                <div class="option-item ${isSelected ? 'selected' : ''}" data-opt-index="${idx}">
                    <i class="fa-solid ${opt.icon}"></i>
                    <span>${opt.text}</span>
                </div>
            `;
        });
        
        html += `</div></div>`;
        quizContainer.innerHTML = html;
        
        document.querySelectorAll('.option-item').forEach(opt => {
            opt.addEventListener('click', () => {
                if (isTransitioning) return;
                const idx = parseInt(opt.dataset.optIndex);
                answers[currentQuestion] = idx;
                document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
                opt.classList.add('selected');
                setTimeout(() => goToNextQuestion(), 150);
            });
        });
    }

    function showContactForm() {
        updateProgress();
        progressFill.style.width = '100%';
        const formHtml = `
            <div class="contact-form-container fade-in">
                <div class="orange-banner">
                    <i class="fa-solid fa-chart-line"></i>
                    <h3>Quase lá!</h3>
                    <p>Você completou todas as perguntas. Preencha seus dados para receber sua análise personalizada.</p>
                </div>
                <div class="form-group">
                    <label><i class="fa-regular fa-user"></i> Seu nome completo</label>
                    <input type="text" id="userName" placeholder="Ex: Ana Silva" autocomplete="name">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Seu telefone com DDD</label>
                    <input type="tel" id="userPhone" placeholder="(11) 99999-9999" autocomplete="tel">
                </div>
                <div class="form-group">
                    <label><i class="fa-regular fa-envelope"></i> Seu e-mail</label>
                    <input type="email" id="userEmail" placeholder="contato@seudominio.com" autocomplete="email">
                </div>
                <button class="submit-contact-btn" id="submitContactBtn">
                    <i class="fa-solid fa-paper-plane"></i> Gerar minha análise
                </button>
            </div>
        `;
        quizContainer.innerHTML = formHtml;
        document.getElementById('submitContactBtn').addEventListener('click', () => {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            if (!name || !phone || !email) { alert('Preencha todos os campos.'); return; }
            if (!phone.match(/^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$/)) { alert('Telefone inválido. Use (11) 99999-9999'); return; }
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { alert('E-mail inválido.'); return; }
            userData = { name, phone, email };
            localStorage.setItem('diagnostico_user_data', JSON.stringify(userData));
            localStorage.setItem('diagnostico_answers', JSON.stringify(answers));
            localStorage.setItem('diagnostico_questions', JSON.stringify(shuffledQuestions));
            showLoadingAndRedirect();
        });
    }

    function showLoadingAndRedirect() {
        loadingOverlay.classList.add('active');
        
        const messages = ['Carregando seu perfil...', 'Analisando suas respostas...', 'Cruzando dados...', 'Gerando recomendações...', 'Preparando relatório...'];
        const loadingMessage = document.getElementById('loadingMessage');
        const progressBar = document.getElementById('loadingProgressBar');
        
        const steps = ['jornadaStep1', 'jornadaStep2', 'jornadaStep3', 'jornadaStep4', 'jornadaStep5'];
        const setas = ['seta1', 'seta2', 'seta3', 'seta4'];
        
        let currentStep = 0;
        
        function updateStep(stepIndex) {
            steps.forEach((step, idx) => {
                const element = document.getElementById(step);
                if (idx <= stepIndex) {
                    element.classList.add('completed');
                } else {
                    element.classList.remove('completed');
                }
            });
            
            setas.forEach((seta, idx) => {
                const setaElement = document.getElementById(seta);
                if (idx < stepIndex) {
                    setaElement.classList.add('active');
                } else {
                    setaElement.classList.remove('active');
                }
            });
            
            if (stepIndex < messages.length) {
                loadingMessage.textContent = messages[stepIndex];
            }
            
            const progress = ((stepIndex + 1) / steps.length) * 100;
            progressBar.style.width = progress + '%';
        }
        
        updateStep(0);
        
        const interval = setInterval(() => {
            currentStep++;
            if (currentStep < steps.length) {
                updateStep(currentStep);
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = 'obrigado.html';
                }, 800);
            }
        }, 700);
    }

    initShuffledQuestions();
    renderQuestion();
</script>
</body>
</html>
