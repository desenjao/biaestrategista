<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Responda às perguntas e descubra o Índice de Maturidade Digital da sua empresa.">
    <title>Diagnóstico Digital | Responda às Perguntas</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #F5F7FA;
            --bg-card: #FFFFFF;
            --orange-primary: #F59E0B;
            --orange-dark: #D97706;
            --orange-light: #FBBF24;
            --orange-soft: #FEF3C7;
            --text-dark: #1A1A2E;
            --text-muted: #6C757D;
            --border-light: #E9ECEF;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-dark);
            font-weight: 400;
        }

        h1, h2, h3, .quiz-section .question-text {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.2rem;
            color: var(--orange-dark);
        }

        .logo-text p {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .back-link {
            color: var(--orange-dark);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s;
        }

        .back-link:hover {
            color: var(--orange-primary);
        }

        .quiz-section {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }

        .question-icon {
            text-align: center;
            margin-bottom: 16px;
        }

        .question-icon i {
            font-size: 2.5rem;
            color: var(--orange-primary);
        }

        .progress-bar {
            background: var(--border-light);
            border-radius: 20px;
            height: 8px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--orange-primary) 0%, var(--orange-light) 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 32px;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .option-item {
            background: var(--bg-page);
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            padding: 16px 24px;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.95rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-item i {
            width: 28px;
            font-size: 1.2rem;
            color: var(--orange-primary);
            transition: all 0.2s;
        }

        .option-item:hover {
            background: var(--orange-soft);
            border-color: var(--orange-primary);
            transform: translateX(5px);
        }

        .option-item.selected {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-color: var(--orange-dark);
            color: white;
        }

        .option-item.selected i {
            color: white !important;
        }

        .fade-out {
            animation: fadeOut 0.2s ease forwards;
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-counter {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .contact-form-container {
            animation: fadeIn 0.5s ease;
        }

        .orange-banner {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            padding: 28px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 32px;
            color: white;
        }

        .orange-banner h3 {
            color: white;
            margin-top: 12px;
        }

        .orange-banner p {
            color: rgba(255,255,255,0.9);

        }

        .orange-banner i {
            font-size: 2.5rem;
            color: white;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-group label i {
            color: var(--orange-primary);
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            background: var(--bg-page);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--orange-primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .submit-contact-btn {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
        }

        .submit-contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
        }

        /* NOVA ANIMAÇÃO - FLUXO DE EVOLUÇÃO (JORNADA) */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-content {
            text-align: center;
            background: white;
            padding: 48px 40px;
            border-radius: 32px;
            max-width: 550px;
            box-shadow: var(--shadow-lg);
        }

        .jornada-container {
            margin-bottom: 40px;
            padding: 20px;
        }

        .jornada-titulo {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--orange-primary);
            margin-bottom: 32px;
            font-family: 'Inter', sans-serif;
        }

        .jornada-linha {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .jornada-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .jornada-icone {
            width: 60px;
            height: 60px;
            background: #F3F4F6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px solid var(--border-light);
        }

        .jornada-icone i {
            font-size: 24px;
            color: #D1D5DB;
            transition: all 0.3s ease;
        }

        .jornada-item.completed .jornada-icone {
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-dark));
            border-color: var(--orange-primary);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .jornada-item.completed .jornada-icone i {
            color: white;
        }

        .jornada-ativo {
            font-size: 0.7rem;
            color: var(--orange-primary);
            font-weight: 500;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .jornada-item.completed .jornada-ativo {
            opacity: 1;
        }

        .jornada-seta {
            font-size: 20px;
            color: var(--orange-primary);
            margin: 0 4px;
            opacity: 0.5;
        }

        .jornada-seta.active {
            opacity: 1;
            color: var(--orange-primary);
        }

        .loading-message {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 24px 0 20px;
        }

        .loading-progress {
            width: 100%;
            height: 6px;
            background: var(--border-light);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--orange-primary), var(--orange-light));
            width: 0%;
            border-radius: 4px;
            transition: width 0.2s linear;
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 40px;
            border-top: 1px solid var(--border-light);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .jornada-icone {
                width: 45px;
                height: 45px;
            }
            .jornada-icone i {
                font-size: 18px;
            }
            .jornada-seta {
                font-size: 14px;
            }
            .jornada-ativo {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px 40px;
            }
            .quiz-section {
                padding: 28px 20px;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .option-item {
                padding: 12px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<script>
    // ÍCONES DAS PERGUNTAS (20 ícones únicos)
    const questionIcons = [
        "fa-user-plus", "fa-gift", "fa-comments", "fa-database", "fa-chess-knight",
        "fa-handshake", "fa-heart", "fa-chart-simple", "fa-calendar-xmark", "fa-mountain-sun",
        "fa-display", "fa-pen-nib", "fa-fish-fins", "fa-robot", "fa-users-gear",
        "fa-money-bill-trend-up", "fa-medal", "fa-gauge-high", "fa-filter", "fa-magnifying-glass"
    ];

    // ÍCONES DAS OPÇÕES NIVEL A (Básico)
    const levelAIcons = [
        "fa-circle", "fa-arrow-down", "fa-bolt", "fa-cloud", "fa-code",
        "fa-cube", "fa-leaf", "fa-seedling", "fa-snowflake", "fa-sun",
        "fa-umbrella", "fa-water", "fa-wind", "fa-anchor", "fa-battery-empty",
        "fa-book", "fa-briefcase", "fa-bug", "fa-camera", "fa-car"
    ];

    // ÍCONES DAS OPÇÕES NIVEL B (Iniciante)
    const levelBIcons = [
        "fa-circle-half-stroke", "fa-arrow-right", "fa-battery-half", "fa-bicycle", "fa-binoculars",
        "fa-brain", "fa-building", "fa-calendar", "fa-circle-nodes", "fa-compass",
        "fa-computer", "fa-copy", "fa-dice", "fa-earth-americas", "fa-envelope-open",
        "fa-eye", "fa-folder", "fa-gamepad", "fa-gear", "fa-database"
    ];

    // ÍCONES DAS OPÇÕES NIVEL C (Intermediário)
    const levelCIcons = [
        "fa-circle-dot", "fa-arrow-up", "fa-battery-full", "fa-bullseye", "fa-chart-column",
        "fa-check", "fa-circle-check", "fa-clock", "fa-cloud-arrow-up", "fa-code-branch",
        "fa-crown", "fa-diamond", "fa-fire", "fa-flag-checkered", "fa-flask",
        "fa-gem", "fa-globe", "fa-headset", "fa-key", "fa-laptop"
    ];

    // ÍCONES DAS OPÇÕES NIVEL D (Avançado)
    const levelDIcons = [
        "fa-circle-radiation", "fa-arrow-up-right-dots", "fa-rocket", "fa-microchip", "fa-network-wired",
        "fa-palette", "fa-plane-departure", "fa-plug", "fa-server", "fa-shield-halved",
        "fa-signal", "fa-sitemap", "fa-star", "fa-stopwatch", "fa-terminal",
        "fa-tower-broadcast", "fa-trophy", "fa-users-line", "fa-wifi", "fa-bolt-lightning"
    ];

    // PERGUNTAS
    const baseQuestions = [
        { text: "Como novos clientes encontram seu negócio hoje?", options: ["Só por indicação de amigos", "Apareço nas redes sem estratégia", "Invisto em anúncios com fluxo instável", "Tenho funil previsível que gera leads"], scores: [0,2,4,5] },
        { text: "Sua oferta é clara para quem não te conhece?", options: ["Difícil explicar", "Descrição genérica", "Oferta clara mas falta desejo", "USP única que converte"], scores: [0,2,4,5] },
        { text: "O que acontece quando alguém demonstra interesse?", options: ["Respondo conforme a demanda", "Tenho script básico", "Sigo processo mas perco contatos", "CRM estruturado com acompanhamento"], scores: [0,2,4,5] },
        { text: "Como você gerencia dados de clientes?", options: ["Guardo tudo na cabeça", "Planilha simples", "Uso CRM para histórico", "Analiso métricas para decisões"], scores: [0,2,4,5] },
        { text: "Como você se posiciona frente à concorrência?", options: ["Nem olho a concorrência", "Copia o que os outros fazem", "Me diferencio em alguns pontos", "Sou referência no meu nicho"], scores: [0,2,4,5] },
        { text: "Como lida com objeções na venda?", options: ["Perco a venda quando hesitam", "Ofereço desconto", "Tenho respostas para objeções", "Quebro objeções antes de surgirem"], scores: [0,2,4,5] },
        { text: "Estratégia para clientes que já compraram?", options: ["Venda termina no pagamento", "Mensagem ocasional", "Contato constante e suporte", "Programa de recorrência"], scores: [0,2,4,5] },
        { text: "Como mede sucesso digital?", options: ["Curtidas e seguidores", "Mensagens no WhatsApp", "Orçamentos e vendas", "CAC e ROI analisados"], scores: [0,2,4,5] },
        { text: "O que acontece se parar de postar 15 dias?", options: ["Negócio para totalmente", "Apenas indicações", "Ainda recebo alguns contatos", "Motor de vendas continua"], scores: [0,2,4,5] },
        { text: "Maior dificuldade para escalar digitalmente?", options: ["Não sei por onde começar", "Falta tempo para tudo", "Tráfego não converte", "Preciso otimizar tecnologia"], scores: [0,2,4,5] },
        { text: "Sua empresa tem site ou landing page?", options: ["Nenhum site", "Site institucional", "Site com formulários", "Landing page que converte"], scores: [0,2,4,5] },
        { text: "Produz conteúdo de valor regularmente?", options: ["Não produzo", "Produzo esporadicamente", "Conteúdo semanal", "Estratégia alinhada ao funil"], scores: [0,2,4,5] },
        { text: "Como captura leads no digital?", options: ["Não capturo", "Apenas WhatsApp", "Formulários básicos", "Iscas digitais qualificadas"], scores: [0,2,4,5] },
        { text: "Usa automação de marketing?", options: ["Não utilizo", "Envio e-mails manual", "Ferramentas básicas", "Automação por jornada"], scores: [0,2,4,5] },
        { text: "Sua equipe está preparada?", options: ["Sou sozinho(a)", "Ajuda sem padrão", "Time treinado", "Time com KPIs e metas"], scores: [0,2,4,5] },
        { text: "Investe em tráfego pago?", options: ["Não invisto", "Testei mas não mantenho", "Invisto esporadicamente", "Invisto com ROI acompanhado"], scores: [0,2,4,5] },
        { text: "Sua marca é reconhecida no mercado?", options: ["Só clientes conhecem", "Reconhecida na cidade", "Conhecida regionalmente", "Referência nacional"], scores: [0,2,4,5] },
        { text: "Acompanha métricas de conversão?", options: ["Não acompanho", "Apenas faturamento", "Algumas métricas", "Dashboard completo"], scores: [0,2,4,5] },
        { text: "Como qualifica os leads?", options: ["Atendo todos", "Perguntas na conversa", "Formulário de qualificação", "Lead scoring automatizado"], scores: [0,2,4,5] },
        { text: "Usa ferramentas de análise como GA?", options: ["Não utilizo", "Instalado mas não analiso", "Analiso ocasionalmente", "Uso dados para otimizar"], scores: [0,2,4,5] }
    ];

    let shuffledQuestions = [];
    let currentQuestion = 0;
    let answers = [];
    let isTransitioning = false;
    let userData = null;

    const quizContainer = document.getElementById('quizContainer');
    const progressFill = document.getElementById('progressFill');
    const loadingOverlay = document.getElementById('loadingOverlay');

    function shuffleArray(array) {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function shuffleOptions(question, idx) {
        const optionsWithScores = question.options.map((opt, optIdx) => ({
            text: opt,
            score: question.scores[optIdx],
            icon: optIdx === 0 ? levelAIcons[idx] : optIdx === 1 ? levelBIcons[idx] : optIdx === 2 ? levelCIcons[idx] : levelDIcons[idx]
        }));
        const shuffled = shuffleArray(optionsWithScores);
        return {
            options: shuffled.map(item => ({ text: item.text, icon: item.icon })),
            scores: shuffled.map(item => item.score)
        };
    }

    function initShuffledQuestions() {
        const shuffledBase = shuffleArray(baseQuestions);
        shuffledQuestions = shuffledBase.map((q, idx) => {
            const shuffledOpts = shuffleOptions(q, idx);
            return {
                text: q.text,
                options: shuffledOpts.options,
                scores: shuffledOpts.scores,
                icon: questionIcons[idx % questionIcons.length]
            };
        });
    }

    function updateProgress() {
        const progress = (currentQuestion / shuffledQuestions.length) * 100;
        progressFill.style.width = progress + '%';
    }

    function goToNextQuestion() {
        if (isTransitioning) return;
        if (currentQuestion + 1 >= shuffledQuestions.length) {
            showContactForm();
            return;
        }
        isTransitioning = true;
        const currentDiv = quizContainer.querySelector('.quiz-question-container');
        if (currentDiv) currentDiv.classList.add('fade-out');
        setTimeout(() => {
            currentQuestion++;
            renderQuestion();
            isTransitioning = false;
        }, 200);
    }

    function renderQuestion() {
        if (currentQuestion >= shuffledQuestions.length) {
            showContactForm();
            return;
        }
        updateProgress();
        const q = shuffledQuestions[currentQuestion];
        
        let html = `
            <div class="quiz-question-container fade-in">
                <div class="question-icon"><i class="fa-solid ${q.icon}"></i></div>
                <div class="question-counter">${currentQuestion + 1} de ${shuffledQuestions.length}</div>
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                <div class="options-list">
        `;
        
        q.options.forEach((opt, idx) => {
            const isSelected = answers[currentQuestion] === idx;
            html += `
                <div class="option-item ${isSelected ? 'selected' : ''}" data-opt-index="${idx}">
                    <i class="fa-solid ${opt.icon}"></i>
                    <span>${opt.text}</span>
                </div>
            `;
        });
        
        html += `</div></div>`;
        quizContainer.innerHTML = html;
        
        document.querySelectorAll('.option-item').forEach(opt => {
            opt.addEventListener('click', () => {
                if (isTransitioning) return;
                const idx = parseInt(opt.dataset.optIndex);
                answers[currentQuestion] = idx;
                document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
                opt.classList.add('selected');
                setTimeout(() => goToNextQuestion(), 150);
            });
        });
    }

    function showContactForm() {
        updateProgress();
        progressFill.style.width = '100%';
        const formHtml = `
            <div class="contact-form-container fade-in">
                <div class="orange-banner">
                    <i class="fa-solid fa-chart-line"></i>
                    <h3>Quase lá!</h3>
                    <p>Você completou todas as perguntas. Preencha seus dados para receber sua análise.</p>
                </div>
                <div class="form-group">
                    <label><i class="fa-regular fa-user"></i> Nome completo</label>
                    <input type="text" id="userName" placeholder="Seu nome" autocomplete="name">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Telefone com DDD</label>
                    <input type="tel" id="userPhone" placeholder="(11) 99999-9999" autocomplete="tel">
                </div>
                <div class="form-group">
                    <label><i class="fa-regular fa-envelope"></i> E-mail</label>
                    <input type="email" id="userEmail" placeholder="seu@email.com" autocomplete="email">
                </div>
                <button class="submit-contact-btn" id="submitContactBtn">
                    <i class="fa-solid fa-paper-plane"></i> Gerar análise
                </button>
            </div>
        `;
        quizContainer.innerHTML = formHtml;
        document.getElementById('submitContactBtn').addEventListener('click', () => {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            if (!name || !phone || !email) { alert('Preencha todos os campos.'); return; }
            if (!phone.match(/^\(?\d{2}\)?\s?\d{4,5}-?\d{4}$/)) { alert('Telefone inválido. Use (11) 99999-9999'); return; }
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { alert('E-mail inválido.'); return; }
            userData = { name, phone, email };
            localStorage.setItem('diagnostico_user_data', JSON.stringify(userData));
            localStorage.setItem('diagnostico_answers', JSON.stringify(answers));
            localStorage.setItem('diagnostico_questions', JSON.stringify(shuffledQuestions));
            showLoadingAndRedirect();
        });
    }

    function showLoadingAndRedirect() {
        loadingOverlay.classList.add('active');
        
        const messages = ['Carregando perfil...', 'Analisando respostas...', 'Calculando maturidade...', 'Gerando recomendações...', 'Preparando relatório...'];
        const loadingMessage = document.getElementById('loadingMessage');
        const progressBar = document.getElementById('loadingProgressBar');
        
        const steps = ['jornadaStep1', 'jornadaStep2', 'jornadaStep3', 'jornadaStep4', 'jornadaStep5'];
        const setas = ['seta1', 'seta2', 'seta3', 'seta4'];
        
        let currentStep = 0;
        
        function updateStep(stepIndex) {
            // Atualizar ícones da jornada
            steps.forEach((step, idx) => {
                const element = document.getElementById(step);
                if (idx <= stepIndex) {
                    element.classList.add('completed');
                } else {
                    element.classList.remove('completed');
                }
            });
            
            // Atualizar setas
            setas.forEach((seta, idx) => {
                const setaElement = document.getElementById(seta);
                if (idx < stepIndex) {
                    setaElement.classList.add('active');
                } else {
                    setaElement.classList.remove('active');
                }
            });
            
            if (stepIndex < messages.length) {
                loadingMessage.textContent = messages[stepIndex];
            }
            
            const progress = ((stepIndex + 1) / steps.length) * 100;
            progressBar.style.width = progress + '%';
        }
        
        updateStep(0);
        
        const interval = setInterval(() => {
            currentStep++;
            
            if (currentStep < steps.length) {
                updateStep(currentStep);
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = 'obrigado.html';
                }, 800);
            }
        }, 700);
    }

    initShuffledQuestions();
    renderQuestion();
</script>
</body>
</html>
